<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Great Reconnect</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #000000;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2.5em;
    }

    .timer {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .box {
      background: #f5f5f5;
      padding: 20px 25px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      min-width: 80px;
      transition: transform 0.2s ease;
    }

    .box:hover {
      transform: translateY(-5px);
    }

    .number {
      font-size: 2.5em;
      font-weight: bold;
    }

    .label {
      font-size: 0.9em;
      margin-top: 5px;
      opacity: 0.7;
    }

    .finished {
      font-size: 3em;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Countdown</h1>

    <div class="timer">
      <div class="box">
        <div id="days" class="number">0</div>
        <div class="label">Days</div>
      </div>
      <div class="box">
        <div id="hours" class="number">0</div>
        <div class="label">Hours</div>
      </div>
      <div class="box">
        <div id="minutes" class="number">0</div>
        <div class="label">Minutes</div>
      </div>
      <div class="box">
        <div id="seconds" class="number">0</div>
        <div class="label">Seconds</div>
      </div>
    </div>

    <div id="done" class="finished" style="display:none;">Time's up!</div>
  </div>

  <script>
    // 🔧 SET YOUR DURATION HERE
    const d = 3;   // days
    const h = 0;   // hours
    const m = 0;   // minutes
    const s = 0;   // seconds

    const duration =
      (d * 24 * 60 * 60 * 1000) +
      (h * 60 * 60 * 1000) +
      (m * 60 * 1000) +
      (s * 1000);

    const target = new Date().getTime() + duration;

    const interval = setInterval(() => {
      const now = new Date().getTime();
      const distance = target - now;

      if (distance <= 0) {
        clearInterval(interval);
        document.querySelector(".timer").style.display = "none";
        document.getElementById("done").style.display = "block";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      document.getElementById("days").innerText = days;
      document.getElementById("hours").innerText = hours;
      document.getElementById("minutes").innerText = minutes;
      document.getElementById("seconds").innerText = seconds;
    }, 1000);
  </script>

</body>
</html>
